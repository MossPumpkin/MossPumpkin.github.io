<html>
 <head>
    <title>Icon Weather Buttons</title>
        <style>
            body{
                background-color: rgb(13, 24, 33);
            }
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;

            
            }
        </style>
    </head>

    <body>
    
        <div class="row">
            <div class="image-container"><img id="snow" src="img/snow1.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="rain" src="img/rain1.svg" height="200" width="200"/></div>
            <div class="image-container"><img id="thunder" src="img/thunder1.svg" height="200" width="200"/></div>
        </div>

        </div>

            <div class="image-container"><img id="day" src="img/night.svg" height="200" width="200"></div>

        </div>

<script>

    snowSound.play ()
